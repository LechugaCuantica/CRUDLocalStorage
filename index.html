<!doctype html>
<html lang="en">

<head>
    <title>Inicio de sesión</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/sketchy/bootstrap.min.css">
</head>

<body>
    <div class="container mt-5">
        <form id="login" class="w-100 border border-3 rounded-3 p-4 border-primary">
            <h1 class="fw-bold mb-2">Inicio de sesión</h1>
            <div class="form-floating mb-3">
                <input type="text" class="form-control" name="user" id="user" placeholder=""
                    aria-describedby="helpUser" />
                <label for="user">Usuario</label>
                <span class="" id="helpUser"></span>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" name="password" id="password" placeholder=""
                    aria-describedby="helpPassword" />
                <label for="password">Contraseña</label>
                <span class="" id="helpPassword"></span>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" value="" id="remember" />
                <label class="form-check-label" for=""> Recordar usuario </label>
            </div>
            <button class="btn btn-success" disabled type="submit">Ingresar</button>
        </form>
    </div>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>

    <script src="./scripts/login.js"></script>
</body>

</html>

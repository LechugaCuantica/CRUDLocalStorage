<!doctype html>
<html lang="en">

<head>
    <title>CRUD - Estudiantes</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/sketchy/bootstrap.min.css">
</head>

<body>
    <div class="container">
        <h1 class="fw-bold mt-5">Gestión de Estudiantes</h1>

        <form id="formData" class="border border-3 rounded-3 p-4 border-primary">
            <div class="mb-3">
                <input type="hidden" id="id">
                <label for="name" class="form-label">Nombre</label>
                <input type="text" class="form-control" name="name" id="name" aria-describedby="helpName"
                    placeholder="Escribe el nombre del estudiante" />
                <small id="helpName"></small>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" name="email" id="email" aria-describedby="helpEmail"
                    placeholder="Escribe el correo electrónico del estudiante" />
                <small id="helpEmail"></small>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Teléfono</label>
                <input type="tel" class="form-control" name="phone" id="phone" aria-describedby="helpPhone"
                    placeholder="Escribe el teléfono del estudiante" />
                <small id="helpPhone"></small>
            </div>
            <div class="mb-3">
                <label for="date" class="form-label">Fecha de nacimiento</label>
                <input type="date" class="form-control" name="date" id="date" aria-describedby="helpDate"
                    placeholder="" />
                <small id="helpDate"></small>
            </div>
            <div class="mb-3">
                <label for="observations">Observaciones</label>
                <textarea class="form-control" placeholder="Escriba las observaciones (opcional)"
                    id="observations"></textarea>
            </div>
            <div class="d-flex justify-content-between">
                <div>
                    <button id="submit" class="btn btn-success" type="submit" disabled>Guardar</button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()" id="cancel">Cancelar</button>
                </div>
                <button class="btn btn-info" onclick="logOut()">Cerrar sesión</button>
            </div>
        </form>

        <div class="table-responsive border border-3 rounded-3 p-4 border-success mt-4">
            <table id="data" class="table table-hover mt-4 d-none">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Correo electrónico</th>
                        <th>Teléfono</th>
                        <th>Fecha de nacimiento</th>
                        <th>Edad</th>
                        <th>Observaciones</th>
                        <th>Acciones</th>
                    </tr>
                <tbody>

                </tbody>
            </table>
        </div>
    </div>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>

    <script src="./scripts/script.js"></script>
</body>

</html>
